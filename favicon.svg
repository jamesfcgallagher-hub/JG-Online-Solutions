  <!-- Screen content: lines -->
  <rect x="6" y="11" width="20" height="1.5" rx="0.75" fill="rgba(255,255,255,0.4)"/>
  <rect x="6" y="14" width="15" height="1.5" rx="0.75" fill="rgba(255,255,255,0.25)"/>
  <!-- Stand neck -->
